name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Catatan exclude crate (lihat job di bawah):
#   - vil-basic-ai-gw-demo, vil-multi-pipeline-benchmark, vil-basic-blocking-task
#     => contoh/benchmark binaries (bukan library surface ter-publish); di-exclude
#        agar CI cepat & tidak gagal karena dependency demo/bench yang berat.
#   - vil_server_macros (hanya job `test`) => proc-macro crate tanpa unit test
#     sendiri; perilakunya tervalidasi lewat test crate downstream.
#   - `-- --skip integration` => integration tests butuh service eksternal,
#     dijalankan terpisah di luar pipeline ini.

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev cmake protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --exclude vil-basic-ai-gw-demo --exclude vil-multi-pipeline-benchmark --exclude vil-basic-blocking-task

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev cmake protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --exclude vil-basic-ai-gw-demo --exclude vil-multi-pipeline-benchmark --exclude vil-basic-blocking-task --exclude vil_server_macros -- --skip integration

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v5
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev cmake protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude vil-basic-ai-gw-demo --exclude vil-multi-pipeline-benchmark --exclude vil-basic-blocking-task

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - run: cargo install cargo-audit --locked
      # RUSTSEC ignore list HARUS sinkron dengan deny.toml [advisories].ignore
      # (deny.toml = single source of truth). Update deny.toml dulu, baru di sini.
      - run: >-
          cargo audit
          --ignore RUSTSEC-2025-0009
          --ignore RUSTSEC-2025-0010
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2024-0421
          --ignore RUSTSEC-2024-0388
          --ignore RUSTSEC-2025-0012
          --ignore RUSTSEC-2024-0384
          --ignore RUSTSEC-2025-0057
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0134

  osv-scanner:
    name: OSV Scanner
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --lockfile Cargo.lock || true

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
