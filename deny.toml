# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/
#
# Remaining advisories are all transitive deps locked by upstream and cannot be
# bumped until upstream ships fixes; each entry below is annotated inline with the
# affected crate + reason. This [advisories].ignore list is the single source of
# truth -- keep .github/workflows/ci.yml (cargo audit --ignore ...) in sync.

[advisories]
ignore = [
    # --- via google-cloud-pubsub 0.25 (vil_mq_pubsub) ---
    "RUSTSEC-2025-0009",   # ring 0.16 — AES panic (overflow-checks=false mitigates)
    "RUSTSEC-2025-0010",   # ring 0.16 — unmaintained
    "RUSTSEC-2023-0071",   # rsa — Marvin attack (transitive)
    "RUSTSEC-2026-0049",   # rustls-webpki 0.100 (transitive)

    # --- via opcua 0.12 (vil_opcua) ---
    "RUSTSEC-2024-0421",   # idna 0.1 — punycode
    "RUSTSEC-2024-0388",   # derivative — unmaintained

    # --- via kube/neo4rs (vil_operator, vil_db_neo4j) ---
    "RUSTSEC-2025-0012",   # backoff — unmaintained
    "RUSTSEC-2024-0384",   # instant — unmaintained

    # --- via wasmtime 24 (vil_capsule) ---
    "RUSTSEC-2025-0057",   # fxhash — unmaintained
    "RUSTSEC-2024-0436",   # paste — unmaintained

    # --- widespread transitive ---
    "RUSTSEC-2025-0134",   # rustls-pemfile — unmaintained (nats, kube, mqtt, etc)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "encoding_rs"
expression = "(Apache-2.0 OR MIT) AND BSD-3-Clause"
license-files = [{ path = "COPYRIGHT", hash = 0x39f8ad31 }]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
